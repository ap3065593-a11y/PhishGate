<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGate - Odisha Cyber Security</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0, 20, 50, 0.75), rgba(0, 20, 50, 0.75)), url('/static/bg.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        /* Mobile par padding thodi kam ki hai */
        .container { background: rgba(255, 255, 255, 0.98); padding: 30px; border-radius: 25px; text-align: center; max-width: 500px; width: 90%; border-top: 8px solid #003366; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 20px; }
        
        .back-btn { display: block; text-align: left; text-decoration: none; color: #003366; font-weight: bold; margin-bottom: 10px; }
        .cyber-badge { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #003366; }
        h1 { color: #003366; margin: 0; font-size: 20px; text-transform: uppercase; }
        .odia-msg { color: #d35400; font-weight: bold; margin: 15px 0; }
        
        /* Mobile touch ke liye input aur button bada kiya */
        input[type="text"] { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ccd1d1; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        button { background: #003366; color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #002244; transform: scale(1.02); }
        
        .credit-section { margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; font-size: 14px; color: #555; }
        .credit-section b { color: #003366; font-size: 15px; }

        /* Choti screen ke liye thoda aur adjustment */
        @media (max-width: 480px) {
            h1 { font-size: 18px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">⬅ Back to Home</a>
        <img src="/static/logo.png" alt="Logo" class="cyber-badge">
        <h1>PHISHGATE - ODISHA CYBER SECURITY</h1>
        <div class="odia-msg">ସୁରକ୍ଷିତ ରୁହନ୍ତୁ, ସତର୍କ ରୁହନ୍ତୁ |</div>
        <form action="/scan" method="post">
            <input type="text" name="url" placeholder="Paste link here..." required>
            <button type="submit">🛡️ INITIATE SECURITY SCAN</button>
        </form>
        <div class="credit-section">
            Team: <b>Jagjit, Shreyas, Aryan, Sameer & Vishaljeet</b><br>
            <small>Cyber Intelligence & Security Team</small>
        </div>
    </div>
</body>
</html>
